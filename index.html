    <!DOCTYPE html>

    <head>

        <!-- Bootstrap CSS -->

        <div class="container">
            <header class="d-flex justify-content-center py-3">
                <ul class="nav nav-pills">
                    <li class="nav-item"><a href="#" class="nav-link active" aria-current="page">Home</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Features</a></li>

        <style>
            body {

                background-color: #000006;
            }

            .main-section {
                min-height: 100vh;
                display: flex;
                align-items: center;
            }

            .logo-text {
                font-size: 28px;
                font-weight: bold;
                color: #193e08;
            }

            .sub-text {
                font-size: 14px;
                color: #6c757d;
            }

            .apply-title {
                font-size: 42px;
                font-weight: 600;
                color: #18650b;
                margin-top: 40px;
            }

            .apply-desc {
                font-size: 18px;
                color: #555;
                margin-bottom: 30px;
            }

            .btn-custom {
                padding: 10px 25px;
                font-weight: 500;
                border-radius: 6px;
            }

            .btn-login {
